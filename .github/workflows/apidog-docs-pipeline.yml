# Apidog docs pipeline — WebAPI-Sample (in-repo source)
#
# This repo contains both the ASP.NET sample API and the docs pipeline.
# On CI the checked-out tree IS the source — pull is skipped by default.
#
# Required secrets:
#   APIDOG_BASE_URL, APIDOG_PROJECT_ID, APIDOG_ACCESS_TOKEN
#   OPENAPI_MODULE_NAME=SampleWebApiAspNetCore  (or set as env below)
#
# Optional:
#   CURSOR_API_KEY (+ CURSOR_MODEL) when run_docs=true
#   REPORT_EMAIL_TO, SMTP_* when run_email=true
#   APIDOG_VERIFY_SSL=false for broken/self-signed TLS
#
name: Apidog docs pipeline

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      run_docs:
        description: "Run Cursor docs steps 2–4 (needs CURSOR_API_KEY)"
        type: boolean
        default: false
      run_email:
        description: "Send README/intro email (step 7)"
        type: boolean
        default: false
      continue_on_error:
        description: "Continue remaining steps after a failure"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: apidog-docs-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    name: openapi → apidog (+ optional docs/email)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      CI: "true"
      # Source is this repo (checked out below) — do not re-clone
      SOURCE_REPO_DIR: "."
      OPENAPI_MODULE_NAME: SampleWebApiAspNetCore
      OPENAPI_PROJECT: SampleWebApiAspNetCore/SampleWebApiAspNetCore.csproj
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CURSOR_MODEL: ${{ secrets.CURSOR_MODEL || 'auto' }}
      APIDOG_BASE_URL: ${{ secrets.APIDOG_BASE_URL }}
      APIDOG_PROJECT_ID: ${{ secrets.APIDOG_PROJECT_ID }}
      APIDOG_ACCESS_TOKEN: ${{ secrets.APIDOG_ACCESS_TOKEN }}
      APIDOG_VERIFY_SSL: ${{ secrets.APIDOG_VERIFY_SSL || 'true' }}
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Install Cursor CLI
        if: ${{ inputs.run_docs }}
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "::error::CURSOR_API_KEY secret is required when run_docs=true"
            exit 1
          fi
          curl -fsSL https://cursor.com/install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          agent --version || cursor-agent --version

      - name: Validate Apidog config
        run: |
          set -euo pipefail
          missing=0
          for key in APIDOG_BASE_URL APIDOG_PROJECT_ID APIDOG_ACCESS_TOKEN; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              missing=1
            fi
          done
          exit "$missing"

      - name: Build orchestrator arguments
        id: args
        shell: bash
        run: |
          set -euo pipefail
          # Always skip pull — source is this checkout
          args=(--skip-pull --module SampleWebApiAspNetCore)

          run_docs="${{ inputs.run_docs }}"
          run_email="${{ inputs.run_email }}"
          # Scheduled monthly run: OpenAPI + upload only (docs/email opt-in via manual run)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            run_docs=false
            run_email=false
          fi

          if [ "$run_docs" != "true" ]; then
            args+=(--skip-docs)
          fi
          if [ "$run_email" != "true" ]; then
            args+=(--skip-email)
          fi
          if [ "${{ inputs.continue_on_error }}" = "true" ]; then
            args+=(--continue-on-error)
          fi

          echo "args=${args[*]}" >> "$GITHUB_OUTPUT"
          echo "Running: python src/orchestrator.py ${args[*]}"

      - name: Run pipeline
        run: python src/orchestrator.py ${{ steps.args.outputs.args }}

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data-${{ github.run_id }}
          path: |
            data/*.openapi.json
            data/*.readme.md
            data/*.intro.md
          if-no-files-found: ignore
          retention-days: 30
