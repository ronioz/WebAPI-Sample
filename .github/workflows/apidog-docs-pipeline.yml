# Regenerated Apidog docs pipeline for WebAPI-Sample.
# Source API lives in this repo — CI skips git pull.
#
# Secrets (Settings → Secrets and variables → Actions):
#   Required: APIDOG_BASE_URL, APIDOG_PROJECT_ID, APIDOG_ACCESS_TOKEN
#   Optional: CURSOR_API_KEY, CURSOR_MODEL, APIDOG_VERIFY_SSL,
#             REPORT_EMAIL_TO, SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM
#
name: Apidog docs pipeline

on:
  schedule:
    # 1st of each month, 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      run_docs:
        description: "Run Cursor docs (steps 2–4). Needs CURSOR_API_KEY."
        type: boolean
        default: false
      run_email:
        description: "Email README/intro (step 7). Needs SMTP secrets."
        type: boolean
        default: false
      continue_on_error:
        description: "Continue after a failed step"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: apidog-docs-${{ github.repository }}
  cancel-in-progress: false

jobs:
  pipeline:
    name: OpenAPI → Apidog
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      CI: "true"
      SOURCE_REPO_DIR: "."
      OPENAPI_MODULE_NAME: SampleWebApiAspNetCore
      OPENAPI_PROJECT: SampleWebApiAspNetCore/SampleWebApiAspNetCore.csproj
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
      CURSOR_MODEL: ${{ secrets.CURSOR_MODEL || 'auto' }}
      APIDOG_BASE_URL: ${{ secrets.APIDOG_BASE_URL }}
      APIDOG_PROJECT_ID: ${{ secrets.APIDOG_PROJECT_ID }}
      APIDOG_ACCESS_TOKEN: ${{ secrets.APIDOG_ACCESS_TOKEN }}
      APIDOG_VERIFY_SSL: ${{ secrets.APIDOG_VERIFY_SSL || 'true' }}
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Install Cursor CLI
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_docs }}
        run: |
          set -euo pipefail
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "::error::Set secret CURSOR_API_KEY when run_docs=true"
            exit 1
          fi
          # Official install puts the binary in ~/.cursor/bin (not ~/.local/bin)
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cursor/bin:$HOME/.local/bin:$PATH"
          if command -v agent >/dev/null 2>&1; then
            agent --version
          elif command -v cursor-agent >/dev/null 2>&1; then
            cursor-agent --version
          else
            echo "::error::Cursor CLI installed but 'agent' not on PATH"
            echo "Looked in: $HOME/.cursor/bin $HOME/.local/bin"
            ls -la "$HOME/.cursor/bin" "$HOME/.local/bin" 2>/dev/null || true
            find "$HOME" -maxdepth 4 -type f \( -name agent -o -name cursor-agent \) 2>/dev/null || true
            exit 1
          fi

      - name: Validate Apidog secrets
        run: |
          set -euo pipefail
          missing=0
          for key in APIDOG_BASE_URL APIDOG_PROJECT_ID APIDOG_ACCESS_TOKEN; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing secret: $key"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run pipeline
        shell: bash
        run: |
          set -euo pipefail
          args=(--skip-pull --module SampleWebApiAspNetCore)

          run_docs=false
          run_email=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run_docs="${{ inputs.run_docs }}"
            run_email="${{ inputs.run_email }}"
          fi

          if [ "$run_docs" != "true" ]; then
            args+=(--skip-docs)
          fi
          if [ "$run_email" != "true" ]; then
            args+=(--skip-email)
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.continue_on_error }}" = "true" ]; then
            args+=(--continue-on-error)
          fi

          echo "Running: python src/orchestrator.py ${args[*]}"
          python src/orchestrator.py "${args[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-data-${{ github.run_id }}
          path: |
            data/*.openapi.json
            data/*.readme.md
            data/*.intro.md
          if-no-files-found: ignore
          retention-days: 30
